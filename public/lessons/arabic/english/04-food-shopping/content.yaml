version: 1
number: 4
title: "الطعام والتسوق"
description: "كلمات وعبارات إنجليزية للطعام والتسوق"
sections:
  - title: "أنواع الطعام"
    explanation: |
      **كلمات الطعام** ضرورية عند زيارة المطاعم أو التسوق.
      في الإنجليزية، بعض أسماء الطعام معدودة (يمكن جمعها) وبعضها غير معدود.
    examples:
      - q: "bread"
        a: "خبز"
        rel:
          - ["bread", "خبز", "اسم غير معدود"]
      - q: "milk"
        a: "حليب"
        rel:
          - ["milk", "حليب", "اسم غير معدود"]
      - q: "meat"
        a: "لحم"
        rel:
          - ["meat", "لحم", "اسم غير معدود"]
      - q: "rice"
        a: "أرز"
        rel:
          - ["rice", "أرز", "اسم غير معدود"]
      - q: "fruits and vegetables"
        a: "فواكه وخضروات"
        rel:
          - ["fruits", "فواكه", "اسم جمع"]
          - ["and", "و", "حرف عطف"]
          - ["vegetables", "خضروات", "اسم جمع"]
  - title: "في المطعم"
    explanation: |
      **في المطعم** ستحتاج هذه العبارات لطلب الطعام والشراب.
      في البلدان الناطقة بالإنجليزية، من المعتاد أن تكون مهذباً عند الطلب.
    examples:
      - q: "Can I see the menu, please?"
        a: "هل يمكنني رؤية قائمة الطعام، من فضلك؟"
        rel:
          - ["Can I", "هل يمكنني", "طلب مهذب"]
          - ["menu", "قائمة الطعام", "اسم"]
          - ["please", "من فضلك", "تعبير مهذب"]
      - q: "I would like to order"
        a: "أود أن أطلب"
        rel:
          - ["I would like", "أود / أريد", "تعبير مهذب"]
          - ["to order", "أن أطلب", "فعل"]
      - q: "The bill, please"
        a: "الحساب، من فضلك"
        rel:
          - ["bill", "حساب / فاتورة", "اسم"]
          - ["please", "من فضلك", "تعبير مهذب"]
      - q: "This is delicious"
        a: "هذا لذيذ"
        rel:
          - ["This", "هذا", "ضمير إشارة"]
          - ["is", "يكون", "فعل"]
          - ["delicious", "لذيذ", "صفة"]
  - title: "التسوق"
    explanation: |
      **عند التسوق** ستحتاج إلى معرفة كيفية السؤال عن الأسعار
      والأحجام. هذه العبارات مفيدة في المتاجر والأسواق.
    examples:
      - q: "How much does this cost?"
        a: "كم يكلف هذا؟"
        rel:
          - ["How much", "كم", "أداة استفهام للكمية"]
          - ["does", "فعل مساعد", "للسؤال"]
          - ["cost", "يكلف", "فعل"]
      - q: "That's too expensive"
        a: "هذا غالٍ جداً"
        rel:
          - ["That's", "هذا", "ضمير إشارة مختصر"]
          - ["too", "جداً / أكثر من اللازم", "ظرف"]
          - ["expensive", "غالٍ", "صفة"]
      - q: "I'll take this"
        a: "سآخذ هذا"
        rel:
          - ["I'll", "سوف أنا", "ضمير + مستقبل"]
          - ["take", "آخذ", "فعل"]
          - ["this", "هذا", "ضمير إشارة"]
      - q: "Where is the supermarket?"
        a: "أين السوبرماركت؟"
        rel:
          - ["Where", "أين", "أداة استفهام"]
          - ["is", "يكون", "فعل"]
          - ["supermarket", "سوبرماركت", "اسم"]
