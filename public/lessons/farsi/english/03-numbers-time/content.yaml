version: 1
number: 3
title: "اعداد و زمان"
description: "یادگیری اعداد، ساعت و روزهای هفته به انگلیسی"
sections:
  - title: "اعداد ۱ تا ۱۲"
    explanation: |
      **اعداد انگلیسی** پایه‌ای‌ترین بخش زبان هستند.
      برای خرید، تلفن، آدرس و خیلی چیزهای دیگر به اعداد نیاز دارید.
    examples:
      - q: "one, two, three"
        a: "یک، دو، سه"
        rel:
          - ["one", "یک", "عدد ۱"]
          - ["two", "دو", "عدد ۲"]
          - ["three", "سه", "عدد ۳"]
      - q: "four, five, six"
        a: "چهار، پنج، شش"
        rel:
          - ["four", "چهار", "عدد ۴"]
          - ["five", "پنج", "عدد ۵"]
          - ["six", "شش", "عدد ۶"]
      - q: "seven, eight, nine"
        a: "هفت، هشت، نه"
        rel:
          - ["seven", "هفت", "عدد ۷"]
          - ["eight", "هشت", "عدد ۸"]
          - ["nine", "نه", "عدد ۹"]
      - q: "ten, eleven, twelve"
        a: "ده، یازده، دوازده"
        rel:
          - ["ten", "ده", "عدد ۱۰"]
          - ["eleven", "یازده", "عدد ۱۱"]
          - ["twelve", "دوازده", "عدد ۱۲"]
  - title: "ساعت و زمان"
    explanation: |
      **گفتن ساعت** در انگلیسی نسبتاً ساده است.
      انگلیسی‌زبانان معمولاً از سیستم ۱۲ ساعته با AM و PM استفاده می‌کنند.
    examples:
      - q: "What time is it?"
        a: "ساعت چند است؟"
        rel:
          - ["What time", "چه ساعتی", "عبارت پرسشی برای زمان"]
      - q: "It's three o'clock."
        a: "ساعت سه است."
        rel:
          - ["o'clock", "تمام / دقیقاً", "برای ساعت‌های کامل بدون دقیقه"]
      - q: "It's half past four."
        a: "ساعت چهار و نیم است."
        rel:
          - ["half past", "نیم / و سی دقیقه", "برای سی دقیقه بعد از ساعت"]
      - q: "It's a quarter to five."
        a: "یک ربع به پنج است."
        rel:
          - ["a quarter to", "یک ربع به", "۱۵ دقیقه مانده به ساعت بعدی"]
      - q: "It's a quarter past two."
        a: "ساعت دو و ربع است."
        rel:
          - ["a quarter past", "و ربع", "۱۵ دقیقه بعد از ساعت"]
  - title: "روزهای هفته و ماه‌ها"
    explanation: |
      **روزهای هفته و ماه‌ها** در انگلیسی همیشه با حرف بزرگ نوشته می‌شوند.
      دانستن این واژه‌ها برای قرار ملاقات و برنامه‌ریزی لازم است.
    examples:
      - q: "Monday, Tuesday, Wednesday"
        a: "دوشنبه، سه‌شنبه، چهارشنبه"
        rel:
          - ["Monday", "دوشنبه", "اولین روز کاری هفته"]
          - ["Tuesday", "سه‌شنبه", "دومین روز کاری"]
          - ["Wednesday", "چهارشنبه", "تلفظ: وِنزدی"]
      - q: "Thursday, Friday"
        a: "پنجشنبه، جمعه"
        rel:
          - ["Thursday", "پنجشنبه", "تلفظ: ثِرزدی"]
          - ["Friday", "جمعه", "آخرین روز کاری هفته"]
      - q: "Saturday, Sunday"
        a: "شنبه، یکشنبه"
        rel:
          - ["Saturday", "شنبه", "اولین روز آخر هفته"]
          - ["Sunday", "یکشنبه", "دومین روز آخر هفته"]
      - q: "Today is Monday."
        a: "امروز دوشنبه است."
        rel:
          - ["today", "امروز", "قید زمان"]
          - ["yesterday", "دیروز", "قید زمان مرتبط"]
          - ["tomorrow", "فردا", "قید زمان مرتبط"]
