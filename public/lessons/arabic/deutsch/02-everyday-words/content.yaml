version: 1
number: 2
title: "الكلمات اليومية"
description: "كلمات وعبارات ألمانية تُستخدم في الحياة اليومية"
sections:
  - title: "الأشخاص والعائلة"
    explanation: |
      **كلمات العائلة والأشخاص** من أكثر الكلمات استخداماً في اللغة الألمانية.
      في الألمانية، كل اسم له جنس (مذكر، مؤنث، أو محايد) ويُكتب بحرف كبير.
    examples:
      - q: "der Mann"
        a: "الرجل"
        rel:
          - ["der", "ال (أداة تعريف مذكر)", "أداة"]
          - ["Mann", "رجل", "اسم مذكر"]
      - q: "die Frau"
        a: "المرأة"
        rel:
          - ["die", "ال (أداة تعريف مؤنث)", "أداة"]
          - ["Frau", "امرأة / سيدة", "اسم مؤنث"]
      - q: "das Kind"
        a: "الطفل"
        rel:
          - ["das", "ال (أداة تعريف محايد)", "أداة"]
          - ["Kind", "طفل", "اسم محايد"]
      - q: "die Familie"
        a: "العائلة"
        rel:
          - ["die", "ال (أداة تعريف مؤنث)", "أداة"]
          - ["Familie", "عائلة", "اسم مؤنث"]
      - q: "der Freund"
        a: "الصديق"
        rel:
          - ["der", "ال (أداة تعريف مذكر)", "أداة"]
          - ["Freund", "صديق", "اسم مذكر"]
  - title: "الأشياء اليومية"
    explanation: |
      **الأشياء التي نستخدمها يومياً** مهمة لبناء مفرداتك الألمانية.
      تذكر أن الأسماء في الألمانية تُكتب دائماً بحرف كبير في البداية.
    examples:
      - q: "das Haus"
        a: "البيت / المنزل"
        rel:
          - ["das", "ال (أداة تعريف محايد)", "أداة"]
          - ["Haus", "بيت / منزل", "اسم محايد"]
      - q: "das Wasser"
        a: "الماء"
        rel:
          - ["das", "ال (أداة تعريف محايد)", "أداة"]
          - ["Wasser", "ماء", "اسم محايد"]
      - q: "das Buch"
        a: "الكتاب"
        rel:
          - ["das", "ال (أداة تعريف محايد)", "أداة"]
          - ["Buch", "كتاب", "اسم محايد"]
      - q: "der Tisch"
        a: "الطاولة"
        rel:
          - ["der", "ال (أداة تعريف مذكر)", "أداة"]
          - ["Tisch", "طاولة", "اسم مذكر"]
      - q: "die Tür"
        a: "الباب"
        rel:
          - ["die", "ال (أداة تعريف مؤنث)", "أداة"]
          - ["Tür", "باب", "اسم مؤنث"]
  - title: "الأفعال الأساسية"
    explanation: |
      **الأفعال الأساسية** هي أساس بناء الجمل في الألمانية.
      في الألمانية، يتغير شكل الفعل حسب الفاعل (التصريف).
    examples:
      - q: "sein"
        a: "يكون"
        rel:
          - ["sein", "يكون", "فعل أساسي غير منتظم"]
      - q: "haben"
        a: "يملك"
        rel:
          - ["haben", "يملك", "فعل أساسي"]
      - q: "machen"
        a: "يفعل / يصنع"
        rel:
          - ["machen", "يفعل / يصنع", "فعل منتظم"]
      - q: "gehen"
        a: "يذهب"
        rel:
          - ["gehen", "يذهب", "فعل غير منتظم"]
