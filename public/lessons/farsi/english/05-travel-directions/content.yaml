version: 1
number: 5
title: "سفر و مسیریابی"
description: "عبارات مهم برای سفر، حمل‌ونقل و پرسیدن مسیر به انگلیسی"
sections:
  - title: "حمل‌ونقل"
    explanation: |
      **وسایل حمل‌ونقل** بخش مهمی از سفر و زندگی روزمره هستند.
      با یادگیری این واژه‌ها می‌توانید به راحتی جابجا شوید.
    examples:
      - q: "the train station"
        a: "ایستگاه قطار"
        rel:
          - ["train station", "ایستگاه قطار", "مکان مهم حمل‌ونقل"]
      - q: "When does the next bus leave?"
        a: "اتوبوس بعدی کی حرکت می‌کند؟"
        rel:
          - ["when", "کی / چه وقت", "کلمه پرسشی زمان"]
          - ["next", "بعدی", "صفت مهم"]
          - ["leave", "حرکت کردن / رفتن", "فعل مربوط به سفر"]
      - q: "A ticket to London, please."
        a: "یک بلیت به لندن، لطفاً."
        rel:
          - ["ticket", "بلیت", "برای قطار، اتوبوس، هواپیما"]
      - q: "the subway / the underground"
        a: "مترو"
        rel:
          - ["subway", "مترو", "در انگلیسی آمریکایی"]
          - ["underground", "مترو", "در انگلیسی بریتانیایی"]
      - q: "the airport"
        a: "فرودگاه"
        rel:
          - ["airport", "فرودگاه", "مکان پرواز هواپیما"]
  - title: "پرسیدن مسیر"
    explanation: |
      **پرسیدن و فهمیدن مسیر** مهارتی ضروری برای هر مسافر است.
      با یادگیری جهت‌ها و عبارات کلیدی دیگر گم نخواهید شد.
    examples:
      - q: "Excuse me, where is...?"
        a: "ببخشید، ... کجاست؟"
        rel:
          - ["Excuse me", "ببخشید", "شروع مؤدبانه برای پرسیدن سؤال"]
      - q: "Go straight ahead."
        a: "مستقیم بروید."
        rel:
          - ["straight ahead", "مستقیم", "جهت مسیر"]
      - q: "Turn right."
        a: "به راست بپیچید."
        rel:
          - ["turn", "پیچیدن", "فعل تغییر جهت"]
          - ["right", "راست", "جهت"]
      - q: "Turn left."
        a: "به چپ بپیچید."
        rel:
          - ["left", "چپ", "جهت"]
      - q: "It's not far from here."
        a: "از اینجا دور نیست."
        rel:
          - ["far", "دور", "صفت فاصله"]
          - ["near", "نزدیک", "متضاد far"]
          - ["here", "اینجا", "قید مکان"]
  - title: "در هتل و فرودگاه"
    explanation: |
      **عبارات مربوط به اقامت و سفر هوایی** برای هر مسافری لازم است.
      با این جملات می‌توانید اتاق رزرو کنید و امور سفر خود را انجام دهید.
    examples:
      - q: "I have a reservation."
        a: "من رزرو دارم."
        rel:
          - ["reservation", "رزرو", "رزرو هتل یا رستوران"]
      - q: "A single room, please."
        a: "یک اتاق یک‌نفره، لطفاً."
        rel:
          - ["single room", "اتاق یک‌نفره", "اتاق برای یک نفر"]
          - ["double room", "اتاق دونفره", "اتاق برای دو نفر"]
      - q: "Where is the airport?"
        a: "فرودگاه کجاست؟"
        rel:
          - ["airport", "فرودگاه", "مکان مهم سفر"]
      - q: "When is the flight?"
        a: "پرواز کی است؟"
        rel:
          - ["flight", "پرواز", "سفر با هواپیما"]
          - ["departure", "خروج / حرکت", "زمان حرکت"]
          - ["arrival", "ورود", "زمان رسیدن"]
