version: 1
number: 3
title: "الأرقام والوقت"
description: "تعلم الأرقام وكيفية قراءة الوقت بالإنجليزية"
sections:
  - title: "الأرقام الأساسية"
    explanation: |
      **الأرقام الإنجليزية** أساسية في الحياة اليومية.
      تحتاجها للتسوق، والعناوين، وأرقام الهواتف.
      الأرقام من 1 إلى 12 لها أسماء فريدة، ثم تتبع نمطاً منتظماً.
    examples:
      - q: "one, two, three"
        a: "واحد، اثنان، ثلاثة"
        rel:
          - ["one", "واحد", "رقم 1"]
          - ["two", "اثنان", "رقم 2"]
          - ["three", "ثلاثة", "رقم 3"]
      - q: "four, five, six"
        a: "أربعة، خمسة، ستة"
        rel:
          - ["four", "أربعة", "رقم 4"]
          - ["five", "خمسة", "رقم 5"]
          - ["six", "ستة", "رقم 6"]
      - q: "seven, eight, nine, ten"
        a: "سبعة، ثمانية، تسعة، عشرة"
        rel:
          - ["seven", "سبعة", "رقم 7"]
          - ["eight", "ثمانية", "رقم 8"]
          - ["nine", "تسعة", "رقم 9"]
          - ["ten", "عشرة", "رقم 10"]
      - q: "twenty, thirty, hundred"
        a: "عشرون، ثلاثون، مئة"
        rel:
          - ["twenty", "عشرون", "رقم 20"]
          - ["thirty", "ثلاثون", "رقم 30"]
          - ["hundred", "مئة", "رقم 100"]
  - title: "الوقت والساعة"
    explanation: |
      **السؤال عن الوقت** من أهم المهارات اليومية.
      في الإنجليزية يُستخدم نظام 12 ساعة مع AM (صباحاً) وPM (مساءً)
      في الحديث اليومي.
    examples:
      - q: "What time is it?"
        a: "كم الساعة؟"
        rel:
          - ["What", "ماذا / ما", "أداة استفهام"]
          - ["time", "الوقت", "اسم"]
          - ["is it", "هي / هو", "فعل + ضمير"]
      - q: "It's three o'clock"
        a: "الساعة الثالثة"
        rel:
          - ["It's", "إنها", "ضمير + فعل"]
          - ["three", "ثلاثة", "رقم"]
          - ["o'clock", "تماماً (ساعة)", "تعبير"]
      - q: "half past three"
        a: "الثالثة والنصف"
        rel:
          - ["half", "نصف", "اسم"]
          - ["past", "بعد", "حرف جر"]
          - ["three", "ثلاثة", "رقم"]
      - q: "quarter past two"
        a: "الثانية والربع"
        rel:
          - ["quarter", "ربع", "اسم"]
          - ["past", "بعد", "حرف جر"]
          - ["two", "اثنان", "رقم"]
      - q: "quarter to five"
        a: "الخامسة إلا ربع"
        rel:
          - ["quarter", "ربع", "اسم"]
          - ["to", "قبل / إلى", "حرف جر"]
          - ["five", "خمسة", "رقم"]
  - title: "أيام الأسبوع والأشهر"
    explanation: |
      **أيام الأسبوع** في الإنجليزية تبدأ دائماً بحرف كبير.
      الأسبوع الإنجليزي يبدأ عادةً يوم الأحد أو الاثنين حسب البلد.
    examples:
      - q: "Monday, Tuesday, Wednesday"
        a: "الاثنين، الثلاثاء، الأربعاء"
        rel:
          - ["Monday", "الاثنين", "يوم"]
          - ["Tuesday", "الثلاثاء", "يوم"]
          - ["Wednesday", "الأربعاء", "يوم - الحرف d صامت"]
      - q: "Thursday, Friday"
        a: "الخميس، الجمعة"
        rel:
          - ["Thursday", "الخميس", "يوم"]
          - ["Friday", "الجمعة", "يوم"]
      - q: "Saturday, Sunday"
        a: "السبت، الأحد"
        rel:
          - ["Saturday", "السبت", "يوم"]
          - ["Sunday", "الأحد", "يوم"]
      - q: "Today is Monday"
        a: "اليوم هو الاثنين"
        rel:
          - ["Today", "اليوم", "ظرف زمان"]
          - ["is", "هو / يكون", "فعل"]
