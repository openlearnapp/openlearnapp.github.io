version: 1
number: 5
title: "Travel and Directions"
description: "Essential travel vocabulary and direction phrases for navigating in Farsi-speaking areas"
sections:
  - title: "Directions"
    explanation: |
      **Asking for directions in Farsi** is essential when traveling in Iran. Iranians are generally very helpful to travelers. Learning basic directional words will make getting around much easier.
    examples:
      - q: "راست"
        a: "Right"
        rel:
          - ["راست", "right", "direction"]
          - ["چپ", "left", "opposite direction"]
      - q: "مستقیم"
        a: "Straight ahead"
        rel:
          - ["مستقیم", "straight", "direction"]
      - q: "کجاست؟"
        a: "Where is it?"
        rel:
          - ["کجا", "where", "question word"]
          - ["است", "is", "verb to be"]
      - q: "نزدیک است یا دور؟"
        a: "Is it near or far?"
        rel:
          - ["نزدیک", "near/close", "adjective"]
          - ["دور", "far", "adjective"]
          - ["یا", "or", "conjunction"]

  - title: "Transportation"
    explanation: |
      **Transportation in Iran** includes taxis, buses, the metro (in Tehran and other major cities), and domestic flights. Shared taxis are common and affordable. The metro system in Tehran is modern and efficient.
    examples:
      - q: "تاکسی"
        a: "Taxi"
        rel:
          - ["تاکسی", "taxi", "noun"]
      - q: "ایستگاه مترو کجاست؟"
        a: "Where is the metro station?"
        rel:
          - ["ایستگاه", "station/stop", "noun"]
          - ["مترو", "metro/subway", "noun"]
          - ["کجا", "where", "question word"]
      - q: "یک بلیت لطفاً"
        a: "One ticket, please"
        rel:
          - ["بلیت", "ticket", "noun"]
          - ["لطفاً", "please", "polite word"]
      - q: "فرودگاه"
        a: "Airport"
        rel:
          - ["فرودگاه", "airport", "noun"]
          - ["هواپیما", "airplane", "noun"]

  - title: "Travel Phrases"
    explanation: |
      **Useful travel phrases** will help you communicate your needs while exploring Iran. From finding your hotel to asking for help, these expressions cover common travel situations.
    examples:
      - q: "هتل من کجاست؟"
        a: "Where is my hotel?"
        rel:
          - ["هتل", "hotel", "noun"]
          - ["من", "my/I", "pronoun"]
      - q: "می‌توانید کمکم کنید؟"
        a: "Can you help me?"
        rel:
          - ["می‌توانید", "can you", "verb"]
          - ["کمک", "help", "noun"]
      - q: "من گم شده‌ام"
        a: "I am lost"
        rel:
          - ["گم شده‌ام", "I am lost", "verb phrase"]
          - ["گم", "lost", "adjective"]
      - q: "فارسی بلد نیستم"
        a: "I don't know Farsi"
        rel:
          - ["فارسی", "Farsi/Persian", "noun"]
          - ["بلد نیستم", "I don't know (a skill)", "verb phrase"]
      - q: "سفر خوبی داشته باشید"
        a: "Have a good trip"
        rel:
          - ["سفر", "trip/travel", "noun"]
          - ["خوب", "good", "adjective"]
