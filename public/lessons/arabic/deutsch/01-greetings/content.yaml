version: 1
number: 1
title: "التحيات والمجاملات"
description: "أهم عبارات التحية والمجاملة بالألمانية"
sections:
  - title: "التحيات الأساسية"
    explanation: |
      **التحيات الألمانية** جزء مهم من الثقافة الألمانية.
      في ألمانيا، يُستخدم تحيات مختلفة حسب الوقت ودرجة الرسمية.
    examples:
      - q: "Hallo"
        a: "مرحباً"
        rel:
          - ["Hallo", "مرحباً", "تحية غير رسمية"]
      - q: "Guten Morgen"
        a: "صباح الخير"
        rel:
          - ["Guten", "طيب / جيد", "صفة"]
          - ["Morgen", "الصباح", "اسم"]
      - q: "Guten Tag"
        a: "نهارك سعيد"
        rel:
          - ["Guten", "طيب / جيد", "صفة"]
          - ["Tag", "اليوم / النهار", "اسم"]
      - q: "Guten Abend"
        a: "مساء الخير"
        rel:
          - ["Guten", "طيب / جيد", "صفة"]
          - ["Abend", "المساء", "اسم"]
      - q: "Gute Nacht"
        a: "تصبح على خير"
        rel:
          - ["Gute", "طيبة / جيدة", "صفة مؤنثة"]
          - ["Nacht", "الليل", "اسم مؤنث"]
  - title: "المجاملات والتعارف"
    explanation: |
      **عند التعارف** في ألمانيا، من المهم أن تعرف كيف تقدم نفسك
      وتسأل عن حال الآخرين. العبارات التالية أساسية في كل محادثة.
    examples:
      - q: "Wie geht es Ihnen?"
        a: "كيف حالك؟ (رسمي)"
        rel:
          - ["Wie", "كيف", "أداة استفهام"]
          - ["geht", "يذهب / يسير", "فعل"]
          - ["Ihnen", "لك (رسمي)", "ضمير"]
      - q: "Mir geht es gut, danke"
        a: "أنا بخير، شكراً"
        rel:
          - ["Mir", "لي", "ضمير"]
          - ["gut", "جيد / بخير", "صفة"]
          - ["danke", "شكراً", "تعبير"]
      - q: "Freut mich"
        a: "تشرفت بمعرفتك"
        rel:
          - ["Freut", "يسعد / يفرح", "فعل"]
          - ["mich", "ني / أنا", "ضمير"]
      - q: "Ich heiße Ahmad"
        a: "اسمي أحمد"
        rel:
          - ["Ich", "أنا", "ضمير"]
          - ["heiße", "أُدعى / اسمي", "فعل"]
      - q: "Auf Wiedersehen"
        a: "مع السلامة"
        rel:
          - ["Auf", "إلى", "حرف جر"]
          - ["Wiedersehen", "اللقاء مرة أخرى", "اسم"]
  - title: "عبارات مهذبة"
    explanation: |
      **الأدب** مهم جداً في الثقافة الألمانية. استخدام كلمات مثل
      "من فضلك" و"شكراً" يُعتبر ضرورياً في التعاملات اليومية.
    examples:
      - q: "Bitte"
        a: "من فضلك / عفواً"
        rel:
          - ["Bitte", "من فضلك", "تعبير مهذب"]
      - q: "Danke schön"
        a: "شكراً جزيلاً"
        rel:
          - ["Danke", "شكراً", "تعبير"]
          - ["schön", "جميل / جزيلاً", "صفة"]
      - q: "Entschuldigung"
        a: "عذراً / المعذرة"
        rel:
          - ["Entschuldigung", "المعذرة", "اسم"]
      - q: "Es tut mir leid"
        a: "أنا آسف"
        rel:
          - ["Es", "هو (ضمير)", "ضمير"]
          - ["tut", "يفعل", "فعل"]
          - ["leid", "أسف / حزن", "اسم"]
