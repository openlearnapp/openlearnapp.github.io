version: 1
number: 5
title: "سفر و مسیریابی"
description: "عبارات مهم برای سفر، حمل‌ونقل و پرسیدن مسیر به آلمانی"
sections:
  - title: "حمل‌ونقل"
    explanation: |
      **سیستم حمل‌ونقل عمومی** در آلمان بسیار پیشرفته و منظم است.
      قطارها، اتوبوس‌ها و مترو از مهم‌ترین وسایل حمل‌ونقل هستند.
    examples:
      - q: "der Bahnhof"
        a: "ایستگاه قطار"
        rel:
          - ["der Bahnhof", "ایستگاه قطار", "اسم مذکر - مرکز حمل‌ونقل شهرها"]
      - q: "Wann fährt der nächste Zug?"
        a: "قطار بعدی کی حرکت می‌کند؟"
        rel:
          - ["wann", "کی / چه وقت", "کلمه پرسشی زمان"]
          - ["der Zug", "قطار", "اسم مذکر"]
          - ["nächste", "بعدی", "صفت مهم"]
      - q: "Eine Fahrkarte nach Berlin, bitte."
        a: "یک بلیت به برلین، لطفاً."
        rel:
          - ["die Fahrkarte", "بلیت", "اسم مؤنث"]
          - ["nach", "به سمت / به", "حرف اضافه جهت"]
      - q: "die U-Bahn"
        a: "مترو"
        rel:
          - ["die U-Bahn", "مترو", "اسم مؤنث - U مخفف Untergrund (زیرزمینی) است"]
      - q: "die Straßenbahn"
        a: "تراموا"
        rel:
          - ["die Straßenbahn", "تراموا", "اسم مؤنث - قطار خیابانی"]
  - title: "پرسیدن مسیر"
    explanation: |
      **پرسیدن و دادن مسیر** مهارتی مهم برای زندگی و سفر در آلمان است.
      با یادگیری جهت‌ها و عبارات کلیدی می‌توانید راه خود را پیدا کنید.
    examples:
      - q: "Entschuldigung, wo ist...?"
        a: "ببخشید، ... کجاست؟"
        rel:
          - ["Entschuldigung", "ببخشید", "شروع مؤدبانه برای پرسیدن سؤال"]
      - q: "Gehen Sie geradeaus."
        a: "مستقیم بروید."
        rel:
          - ["geradeaus", "مستقیم", "جهت مسیر"]
          - ["gehen", "رفتن", "فعل حرکت پیاده"]
      - q: "Biegen Sie rechts ab."
        a: "به راست بپیچید."
        rel:
          - ["rechts", "راست", "جهت"]
          - ["abbiegen", "پیچیدن", "فعل جداشدنی"]
      - q: "Biegen Sie links ab."
        a: "به چپ بپیچید."
        rel:
          - ["links", "چپ", "جهت"]
      - q: "Es ist nicht weit von hier."
        a: "از اینجا دور نیست."
        rel:
          - ["weit", "دور", "صفت فاصله"]
          - ["hier", "اینجا", "قید مکان"]
  - title: "در هتل و فرودگاه"
    explanation: |
      **عبارات مربوط به اقامت و سفر هوایی** برای مسافران ضروری است.
      با این عبارات می‌توانید اتاق رزرو کنید و در فرودگاه ارتباط برقرار کنید.
    examples:
      - q: "Ich habe eine Reservierung."
        a: "من رزرو دارم."
        rel:
          - ["die Reservierung", "رزرو", "اسم مؤنث"]
      - q: "Ein Einzelzimmer, bitte."
        a: "یک اتاق یک‌نفره، لطفاً."
        rel:
          - ["das Einzelzimmer", "اتاق یک‌نفره", "اسم خنثی"]
          - ["das Doppelzimmer", "اتاق دونفره", "اسم خنثی"]
      - q: "Wo ist der Flughafen?"
        a: "فرودگاه کجاست؟"
        rel:
          - ["der Flughafen", "فرودگاه", "اسم مذکر"]
      - q: "Wann ist der Abflug?"
        a: "پرواز کی است؟"
        rel:
          - ["der Abflug", "پرواز (خروجی)", "اسم مذکر"]
          - ["die Ankunft", "ورود", "اسم مؤنث - متضاد Abflug"]
