version: 1
number: 5
title: "السفر والاتجاهات"
description: "كلمات وعبارات ألمانية للسفر والتنقل والاتجاهات"
sections:
  - title: "وسائل النقل"
    explanation: |
      **وسائل النقل العام** في ألمانيا ممتازة ومنتشرة.
      القطارات والحافلات والترام تغطي معظم المدن والمناطق.
      معرفة هذه الكلمات ستساعدك على التنقل بسهولة.
    examples:
      - q: "der Bahnhof"
        a: "محطة القطار"
        rel:
          - ["der", "ال (أداة تعريف مذكر)", "أداة"]
          - ["Bahnhof", "محطة قطار", "اسم مذكر مركب: Bahn (سكة) + Hof (ساحة)"]
      - q: "der Zug"
        a: "القطار"
        rel:
          - ["der", "ال (أداة تعريف مذكر)", "أداة"]
          - ["Zug", "قطار", "اسم مذكر"]
      - q: "der Bus"
        a: "الحافلة"
        rel:
          - ["der", "ال (أداة تعريف مذكر)", "أداة"]
          - ["Bus", "حافلة", "اسم مذكر"]
      - q: "das Flugzeug"
        a: "الطائرة"
        rel:
          - ["das", "ال (أداة تعريف محايد)", "أداة"]
          - ["Flugzeug", "طائرة", "اسم محايد مركب: Flug (طيران) + Zeug (آلة)"]
      - q: "die Fahrkarte"
        a: "تذكرة السفر"
        rel:
          - ["die", "ال (أداة تعريف مؤنث)", "أداة"]
          - ["Fahrkarte", "تذكرة سفر", "اسم مؤنث مركب: Fahr (سفر) + Karte (بطاقة)"]
  - title: "السؤال عن الاتجاهات"
    explanation: |
      **السؤال عن الطريق** مهارة أساسية عند السفر.
      الألمان عادةً مستعدون لمساعدتك إذا سألت بأدب.
      استخدم "Entschuldigung" (عذراً) قبل السؤال.
    examples:
      - q: "Wo ist der Bahnhof?"
        a: "أين محطة القطار؟"
        rel:
          - ["Wo", "أين", "أداة استفهام"]
          - ["ist", "يكون", "فعل"]
          - ["Bahnhof", "محطة القطار", "اسم مذكر"]
      - q: "Wie komme ich zum Hotel?"
        a: "كيف أصل إلى الفندق؟"
        rel:
          - ["Wie", "كيف", "أداة استفهام"]
          - ["komme", "أصل / آتي", "فعل"]
          - ["ich", "أنا", "ضمير"]
          - ["zum", "إلى ال (zu + dem)", "حرف جر + أداة"]
      - q: "Gehen Sie geradeaus"
        a: "سِرْ مباشرة إلى الأمام"
        rel:
          - ["Gehen", "يذهب / يسير", "فعل"]
          - ["Sie", "أنت (رسمي)", "ضمير"]
          - ["geradeaus", "مباشرة / مستقيم", "ظرف"]
      - q: "Biegen Sie links ab"
        a: "انعطف يساراً"
        rel:
          - ["Biegen", "ينعطف", "فعل"]
          - ["links", "يساراً", "ظرف"]
          - ["ab", "جزء من الفعل المنفصل abbiegen", "بادئة فعلية"]
      - q: "Biegen Sie rechts ab"
        a: "انعطف يميناً"
        rel:
          - ["Biegen", "ينعطف", "فعل"]
          - ["rechts", "يميناً", "ظرف"]
          - ["ab", "جزء من الفعل المنفصل abbiegen", "بادئة فعلية"]
  - title: "في الفندق والمطار"
    explanation: |
      **عبارات الفندق والمطار** مهمة لكل مسافر.
      هذه العبارات ستساعدك عند الحجز وتسجيل الوصول والمغادرة.
    examples:
      - q: "Ich habe eine Reservierung"
        a: "لدي حجز"
        rel:
          - ["Ich", "أنا", "ضمير"]
          - ["habe", "أملك / لدي", "فعل"]
          - ["Reservierung", "حجز", "اسم مؤنث"]
      - q: "Ein Zimmer für zwei Nächte"
        a: "غرفة لليلتين"
        rel:
          - ["Zimmer", "غرفة", "اسم محايد"]
          - ["für", "لـ / من أجل", "حرف جر"]
          - ["zwei Nächte", "ليلتين", "رقم + اسم جمع"]
      - q: "Wo ist der Ausgang?"
        a: "أين المخرج؟"
        rel:
          - ["Wo", "أين", "أداة استفهام"]
          - ["Ausgang", "مخرج", "اسم مذكر مركب: Aus (خارج) + Gang (ممر)"]
      - q: "Ich brauche ein Taxi"
        a: "أحتاج سيارة أجرة"
        rel:
          - ["Ich", "أنا", "ضمير"]
          - ["brauche", "أحتاج", "فعل"]
          - ["Taxi", "سيارة أجرة / تاكسي", "اسم محايد"]
