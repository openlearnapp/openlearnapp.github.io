number: 3
title: "Das alte Haus"
description: "Mila entdeckt ein geheimnisvolles Haus."
image: "images/house.svg"
sections:
  - title: "Das Haus im Wald"
    image: "images/house.svg"
    examples:
      - q: "Mila ging den schmalen Weg entlang und entdeckte ein altes Haus."
        voice: narrator
      - q: "Die Tuer stand offen und warmes Licht schien heraus."
        voice: narrator
      - q: "'Komm herein, kleines Maedchen,' sagte eine freundliche Stimme."
        voice: grandma
      - q: "Drinnen sass eine alte Frau mit einem grossen Buch voller Geschichten."
        voice: narrator
      - q: "Was hatte die alte Frau?"
        type: input
        answers:
          - text: "ein Buch"
            goto: { lesson: 3, section: 1 }
          - text: "Buch"
            goto: { lesson: 3, section: 1 }
          - text: "ein grosses Buch"
            goto: { lesson: 3, section: 1 }
        goto_wrong: { lesson: 3, section: 0 }
  - title: "Die Geschichten"
    image: "images/house.svg"
    examples:
      - q: "'Jede Geschichte fuehrt in eine neue Welt,' sagte sie laechelnd."
        voice: grandma
      - q: "Mila setzte sich neben die alte Frau und begann zu lesen."
        voice: narrator
      - q: "Und so begann ein neues Abenteuer..."
        voice: narrator
