version: 1
number: 2
title: "Everyday Words"
description: "Common words and expressions used in daily Farsi conversation"
sections:
  - title: "Basic Words and Opposites"
    explanation: |
      **Everyday Farsi words** form the building blocks of conversation. Many basic words come in pairs of opposites. Learning these pairs makes it easier to describe the world around you.
    examples:
      - q: "بله"
        a: "Yes"
        rel:
          - ["بله", "Yes", "formal"]
          - ["آره", "Yeah", "informal"]
      - q: "نه"
        a: "No"
        rel:
          - ["نه", "No", "standard"]
          - ["نخیر", "No", "formal/polite"]
      - q: "خوب"
        a: "Good"
        rel:
          - ["خوب", "good", "adjective"]
          - ["بد", "bad", "opposite"]
      - q: "بزرگ"
        a: "Big"
        rel:
          - ["بزرگ", "big/large", "adjective"]
          - ["کوچک", "small/little", "opposite"]
      - q: "زیاد"
        a: "Much / A lot"
        rel:
          - ["زیاد", "much/a lot", "adjective/adverb"]
          - ["کم", "little/few", "opposite"]

  - title: "Colors"
    explanation: |
      **Colors in Farsi** are used just like adjectives and typically come after the noun they describe. For example, "کتاب قرمز" means "red book" (literally "book red").
    examples:
      - q: "قرمز"
        a: "Red"
        rel:
          - ["قرمز", "red", "color"]
      - q: "آبی"
        a: "Blue"
        rel:
          - ["آبی", "blue", "color, derived from آب (water)"]
      - q: "سبز"
        a: "Green"
        rel:
          - ["سبز", "green", "color"]
      - q: "سفید"
        a: "White"
        rel:
          - ["سفید", "white", "color"]
          - ["سیاه", "black", "opposite color"]

  - title: "Family Members"
    explanation: |
      **Family is central to Iranian culture.** Farsi has specific words for paternal and maternal relatives, which shows the importance of family structure. Here are the most essential family terms.
    examples:
      - q: "پدر"
        a: "Father"
        rel:
          - ["پدر", "father", "noun"]
          - ["بابا", "dad", "informal"]
      - q: "مادر"
        a: "Mother"
        rel:
          - ["مادر", "mother", "noun"]
          - ["مامان", "mom", "informal"]
      - q: "برادر"
        a: "Brother"
        rel:
          - ["برادر", "brother", "noun"]
          - ["داداش", "bro", "informal"]
      - q: "خواهر"
        a: "Sister"
        rel:
          - ["خواهر", "sister", "noun"]
          - ["آبجی", "sis", "informal"]
      - q: "فرزند"
        a: "Child"
        rel:
          - ["فرزند", "child", "noun, formal"]
          - ["بچه", "child/kid", "noun, informal"]
