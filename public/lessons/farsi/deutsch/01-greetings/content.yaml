version: 1
number: 1
title: "سلام و احوالپرسی"
description: "مهم‌ترین عبارات سلام و احوالپرسی به آلمانی"
sections:
  - title: "سلام‌های رسمی و غیررسمی"
    explanation: |
      **سلام‌های آلمانی** بخش مهمی از فرهنگ آلمان هستند.
      در آلمانی بین سلام‌های رسمی و غیررسمی تفاوت زیادی وجود دارد.
      در موقعیت‌های رسمی از «Sie» و در موقعیت‌های غیررسمی از «du» استفاده می‌شود.
    examples:
      - q: "Hallo"
        a: "سلام"
        rel:
          - ["Hallo", "سلام", "سلام غیررسمی برای دوستان و آشنایان"]
      - q: "Guten Morgen"
        a: "صبح بخیر"
        rel:
          - ["Guten Morgen", "صبح بخیر", "از صبح تا حدود ساعت ۱۰ استفاده می‌شود"]
      - q: "Guten Tag"
        a: "روز بخیر"
        rel:
          - ["Guten Tag", "روز بخیر", "سلام رسمی در طول روز"]
      - q: "Guten Abend"
        a: "عصر بخیر"
        rel:
          - ["Guten Abend", "عصر بخیر", "از حدود ساعت ۱۸ به بعد استفاده می‌شود"]
      - q: "Gute Nacht"
        a: "شب بخیر"
        rel:
          - ["Gute Nacht", "شب بخیر", "هنگام خداحافظی در شب"]
  - title: "احوالپرسی"
    explanation: |
      بعد از سلام کردن معمولاً **احوالپرسی** می‌کنیم.
      در آلمانی چند روش رایج برای پرسیدن حال کسی وجود دارد.
    examples:
      - q: "Wie geht es Ihnen?"
        a: "حالتان چطور است؟"
        rel:
          - ["Wie geht es Ihnen?", "حالتان چطور است؟", "شکل رسمی احوالپرسی"]
      - q: "Wie geht's?"
        a: "چطوری؟"
        rel:
          - ["Wie geht's?", "چطوری؟", "شکل غیررسمی و کوتاه‌شده"]
      - q: "Mir geht es gut, danke."
        a: "حالم خوب است، ممنون."
        rel:
          - ["gut", "خوب", "صفت پرکاربرد"]
          - ["danke", "ممنون", "تشکر غیررسمی"]
      - q: "Nicht so gut."
        a: "چندان خوب نیست."
        rel:
          - ["nicht", "نه / نیست", "کلمه نفی در آلمانی"]
      - q: "Es geht."
        a: "بد نیست."
        rel:
          - ["Es geht.", "بد نیست.", "وقتی حالتان نه خوب است نه بد"]
  - title: "خداحافظی"
    explanation: |
      **عبارات خداحافظی** در آلمانی هم مانند سلام‌ها متنوع هستند.
      بسته به موقعیت و درجه صمیمیت، عبارات مختلفی استفاده می‌شود.
    examples:
      - q: "Auf Wiedersehen"
        a: "خداحافظ"
        rel:
          - ["Auf Wiedersehen", "خداحافظ", "خداحافظی رسمی"]
      - q: "Tschüss"
        a: "خداحافظ"
        rel:
          - ["Tschüss", "خداحافظ", "خداحافظی غیررسمی و دوستانه"]
      - q: "Bis morgen"
        a: "تا فردا"
        rel:
          - ["Bis morgen", "تا فردا", "وقتی فردا دوباره کسی را می‌بینید"]
      - q: "Bis bald"
        a: "تا به زودی"
        rel:
          - ["Bis bald", "تا به زودی", "وقتی نمی‌دانید کی دوباره می‌بینید"]
