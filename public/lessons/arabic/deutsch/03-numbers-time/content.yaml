version: 1
number: 3
title: "الأرقام والوقت"
description: "تعلم الأرقام وكيفية قراءة الوقت بالألمانية"
sections:
  - title: "الأرقام الأساسية"
    explanation: |
      **الأرقام الألمانية** مهمة جداً في الحياة اليومية.
      تحتاجها للتسوق، والعناوين، وأرقام الهواتف. لاحظ أن الأرقام المركبة
      تُقرأ بترتيب معكوس (الآحاد قبل العشرات).
    examples:
      - q: "eins, zwei, drei"
        a: "واحد، اثنان، ثلاثة"
        rel:
          - ["eins", "واحد", "رقم 1"]
          - ["zwei", "اثنان", "رقم 2"]
          - ["drei", "ثلاثة", "رقم 3"]
      - q: "vier, fünf, sechs"
        a: "أربعة، خمسة، ستة"
        rel:
          - ["vier", "أربعة", "رقم 4"]
          - ["fünf", "خمسة", "رقم 5"]
          - ["sechs", "ستة", "رقم 6"]
      - q: "sieben, acht, neun, zehn"
        a: "سبعة، ثمانية، تسعة، عشرة"
        rel:
          - ["sieben", "سبعة", "رقم 7"]
          - ["acht", "ثمانية", "رقم 8"]
          - ["neun", "تسعة", "رقم 9"]
          - ["zehn", "عشرة", "رقم 10"]
      - q: "zwanzig, dreißig, hundert"
        a: "عشرون، ثلاثون، مئة"
        rel:
          - ["zwanzig", "عشرون", "رقم 20"]
          - ["dreißig", "ثلاثون", "رقم 30"]
          - ["hundert", "مئة", "رقم 100"]
  - title: "الوقت والساعة"
    explanation: |
      **السؤال عن الوقت** من أهم المهارات اليومية.
      في ألمانيا يُستخدم نظام 24 ساعة في المواعيد الرسمية،
      ونظام 12 ساعة في الحديث اليومي.
    examples:
      - q: "Wie spät ist es?"
        a: "كم الساعة؟"
        rel:
          - ["Wie", "كيف / كم", "أداة استفهام"]
          - ["spät", "متأخر", "صفة"]
          - ["ist", "يكون (هو/هي)", "فعل"]
      - q: "Es ist drei Uhr"
        a: "الساعة الثالثة"
        rel:
          - ["Es ist", "إنها / هي", "تعبير"]
          - ["drei", "ثلاثة", "رقم"]
          - ["Uhr", "ساعة", "اسم مؤنث"]
      - q: "halb vier"
        a: "الثالثة والنصف"
        rel:
          - ["halb", "نصف", "صفة"]
          - ["vier", "أربعة", "رقم - يعني نصف الرابعة"]
      - q: "Viertel nach zwei"
        a: "الثانية والربع"
        rel:
          - ["Viertel", "ربع", "اسم"]
          - ["nach", "بعد", "حرف جر"]
          - ["zwei", "اثنان", "رقم"]
      - q: "Viertel vor fünf"
        a: "الخامسة إلا ربع"
        rel:
          - ["Viertel", "ربع", "اسم"]
          - ["vor", "قبل", "حرف جر"]
          - ["fünf", "خمسة", "رقم"]
  - title: "أيام الأسبوع والأشهر"
    explanation: |
      **أيام الأسبوع** في الألمانية كلها مذكرة وتبدأ بحرف كبير.
      معرفتها ضرورية لتحديد المواعيد والتخطيط.
    examples:
      - q: "Montag, Dienstag, Mittwoch"
        a: "الاثنين، الثلاثاء، الأربعاء"
        rel:
          - ["Montag", "الاثنين", "يوم"]
          - ["Dienstag", "الثلاثاء", "يوم"]
          - ["Mittwoch", "الأربعاء", "يوم - من Mitte (وسط)"]
      - q: "Donnerstag, Freitag"
        a: "الخميس، الجمعة"
        rel:
          - ["Donnerstag", "الخميس", "يوم"]
          - ["Freitag", "الجمعة", "يوم"]
      - q: "Samstag, Sonntag"
        a: "السبت، الأحد"
        rel:
          - ["Samstag", "السبت", "يوم"]
          - ["Sonntag", "الأحد", "يوم - من Sonne (شمس)"]
      - q: "Heute ist Montag"
        a: "اليوم هو الاثنين"
        rel:
          - ["Heute", "اليوم", "ظرف زمان"]
          - ["ist", "هو / يكون", "فعل"]
