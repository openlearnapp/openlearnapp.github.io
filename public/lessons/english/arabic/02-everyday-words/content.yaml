version: 1
number: 2
title: "Everyday Words"
description: "Common Arabic words for daily life including yes/no, opposites, colors, and family"
sections:
  - title: "Yes, No, and Basic Responses"
    explanation: |
      **Basic response words** are among the first things you need in any language. Arabic has straightforward words for yes, no, and other essential responses that you will use constantly.
    examples:
      - q: "نعم"
        a: "Yes"
        rel:
          - ["نعم", "Yes", "the formal word for yes in MSA"]
          - ["لا", "No", "the opposite of نعم"]
      - q: "لا"
        a: "No"
        rel:
          - ["لا", "No", "used to negate or refuse"]
      - q: "ربما"
        a: "Maybe / Perhaps"
        rel:
          - ["ربما", "Maybe", "used to express uncertainty"]
      - q: "طبعاً"
        a: "Of course"
        rel:
          - ["طبعاً", "Of course", "used to express strong agreement"]
      - q: "لا أعرف"
        a: "I don't know"
        rel:
          - ["لا أعرف", "I don't know", "a very useful everyday phrase"]
          - ["أعرف", "I know", "the affirmative form"]

  - title: "Opposites and Descriptions"
    explanation: |
      **Common opposites** help you describe the world around you. Arabic adjectives change form based on gender, but here we present the masculine form, which is the base form used in most contexts.
    examples:
      - q: "كبير / صغير"
        a: "Big / Small"
        rel:
          - ["كبير", "Big", "used for size and also for age (old)"]
          - ["صغير", "Small", "used for size and also for age (young)"]
      - q: "جديد / قديم"
        a: "New / Old"
        rel:
          - ["جديد", "New", "for objects and ideas"]
          - ["قديم", "Old", "for objects, buildings, and traditions"]
      - q: "جميل / قبيح"
        a: "Beautiful / Ugly"
        rel:
          - ["جميل", "Beautiful", "commonly used as a compliment"]
          - ["قبيح", "Ugly", "the opposite of جميل"]
      - q: "سريع / بطيء"
        a: "Fast / Slow"
        rel:
          - ["سريع", "Fast", "used for speed"]
          - ["بطيء", "Slow", "the opposite of سريع"]
      - q: "أبيض / أسود"
        a: "White / Black"
        rel:
          - ["أبيض", "White", "a basic color"]
          - ["أسود", "Black", "a basic color"]
          - ["أحمر", "Red", "another common color"]
          - ["أزرق", "Blue", "another common color"]
          - ["أخضر", "Green", "another common color"]

  - title: "Family Members"
    explanation: |
      **Family** is central to Arab culture. Arabic has specific words for each family relationship, and some are more precise than English equivalents. For example, Arabic distinguishes between paternal and maternal uncles.
    examples:
      - q: "أب / أم"
        a: "Father / Mother"
        rel:
          - ["أب", "Father", "also written as والد"]
          - ["أم", "Mother", "also written as والدة"]
      - q: "أخ / أخت"
        a: "Brother / Sister"
        rel:
          - ["أخ", "Brother", "male sibling"]
          - ["أخت", "Sister", "female sibling"]
      - q: "ابن / ابنة"
        a: "Son / Daughter"
        rel:
          - ["ابن", "Son", "male child"]
          - ["ابنة", "Daughter", "female child"]
      - q: "جد / جدة"
        a: "Grandfather / Grandmother"
        rel:
          - ["جد", "Grandfather", "paternal or maternal"]
          - ["جدة", "Grandmother", "paternal or maternal"]
      - q: "عائلة"
        a: "Family"
        rel:
          - ["عائلة", "Family", "the word for family in general"]
          - ["زوج", "Husband", "male spouse"]
          - ["زوجة", "Wife", "female spouse"]
