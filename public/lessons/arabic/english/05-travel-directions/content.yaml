version: 1
number: 5
title: "السفر والاتجاهات"
description: "كلمات وعبارات إنجليزية للسفر والتنقل والاتجاهات"
sections:
  - title: "وسائل النقل"
    explanation: |
      **وسائل النقل** مهمة لكل مسافر يتحدث الإنجليزية.
      معرفة هذه الكلمات ستساعدك على التنقل في أي بلد ناطق بالإنجليزية.
    examples:
      - q: "train station"
        a: "محطة القطار"
        rel:
          - ["train", "قطار", "اسم"]
          - ["station", "محطة", "اسم"]
      - q: "train"
        a: "قطار"
        rel:
          - ["train", "قطار", "اسم"]
      - q: "bus"
        a: "حافلة"
        rel:
          - ["bus", "حافلة", "اسم، جمعه buses"]
      - q: "airplane"
        a: "طائرة"
        rel:
          - ["airplane", "طائرة", "اسم، يُقال أيضاً plane"]
      - q: "ticket"
        a: "تذكرة"
        rel:
          - ["ticket", "تذكرة", "اسم"]
  - title: "السؤال عن الاتجاهات"
    explanation: |
      **السؤال عن الطريق** مهارة أساسية عند السفر.
      ابدأ دائماً بـ "Excuse me" (عذراً) لتكون مهذباً عند السؤال.
    examples:
      - q: "Where is the train station?"
        a: "أين محطة القطار؟"
        rel:
          - ["Where", "أين", "أداة استفهام"]
          - ["is", "يكون", "فعل"]
          - ["train station", "محطة القطار", "اسم مركب"]
      - q: "How do I get to the hotel?"
        a: "كيف أصل إلى الفندق؟"
        rel:
          - ["How", "كيف", "أداة استفهام"]
          - ["do I get", "أصل", "فعل مساعد + ضمير + فعل"]
          - ["to the hotel", "إلى الفندق", "حرف جر + اسم"]
      - q: "Go straight ahead"
        a: "سِرْ مباشرة إلى الأمام"
        rel:
          - ["Go", "اذهب / سِرْ", "فعل أمر"]
          - ["straight ahead", "مباشرة إلى الأمام", "ظرف"]
      - q: "Turn left"
        a: "انعطف يساراً"
        rel:
          - ["Turn", "انعطف", "فعل أمر"]
          - ["left", "يساراً", "ظرف"]
      - q: "Turn right"
        a: "انعطف يميناً"
        rel:
          - ["Turn", "انعطف", "فعل أمر"]
          - ["right", "يميناً", "ظرف"]
  - title: "في الفندق والمطار"
    explanation: |
      **عبارات الفندق والمطار** مهمة لكل مسافر.
      هذه العبارات ستساعدك عند الحجز وتسجيل الوصول والمغادرة.
    examples:
      - q: "I have a reservation"
        a: "لدي حجز"
        rel:
          - ["I have", "لدي / أملك", "ضمير + فعل"]
          - ["reservation", "حجز", "اسم"]
      - q: "A room for two nights"
        a: "غرفة لليلتين"
        rel:
          - ["room", "غرفة", "اسم"]
          - ["for", "لـ / من أجل", "حرف جر"]
          - ["two nights", "ليلتين", "رقم + اسم جمع"]
      - q: "Where is the exit?"
        a: "أين المخرج؟"
        rel:
          - ["Where", "أين", "أداة استفهام"]
          - ["exit", "مخرج", "اسم"]
      - q: "I need a taxi"
        a: "أحتاج سيارة أجرة"
        rel:
          - ["I need", "أحتاج", "ضمير + فعل"]
          - ["taxi", "سيارة أجرة / تاكسي", "اسم"]
