number: 1
title: "Der geheimnisvolle Wald"
description: "Mila entdeckt einen Wald und muss sich entscheiden."
image: "images/forest.svg"
sections:
  - title: "Es war einmal"
    image: "images/forest.svg"
    examples:
      - q: "Es war einmal ein kleines Maedchen namens Mila."
        voice: narrator
      - q: "Mila lebte in einem kleinen Dorf am Rande eines grossen Waldes."
        voice: narrator
      - q: "Eines Tages hoerte sie ein geheimnisvolles Geraeusch aus dem Wald."
        voice: narrator
      - q: "Wohin soll Mila gehen?"
        type: select
        options:
          - text: "Zum Fluss"
            image: "images/river.svg"
            goto: { lesson: 2, section: 0 }
          - text: "Zum alten Haus"
            image: "images/house.svg"
            goto: { lesson: 3, section: 0 }
