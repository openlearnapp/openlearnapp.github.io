<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs><style>
    .fh{animation:fhp 2.5s ease-in-out infinite}@keyframes fhp{0%,70%,100%{transform:translateY(0)}80%{transform:translateY(-12px)}90%{transform:translateY(3px)}}
    .sp{animation:spk 1.5s ease-in-out infinite}@keyframes spk{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:.8;transform:scale(1.3)}}
    .qb{animation:qbb 1.2s ease-in-out infinite}@keyframes qbb{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  </style></defs>
  <rect width="400" height="280" fill="#0f1e30"/>
  <!-- Fokus auf Fridolin — groß in der Mitte -->
  <ellipse cx="200" cy="240" rx="50" ry="18" fill="#5a6a5a"/>
  <g transform="translate(200, 200)"><g class="fh">
    <!-- Körper -->
    <ellipse cx="0" cy="0" rx="30" ry="22" fill="#3aaa4a"/>
    <!-- Augen (groß, freundlich) -->
    <circle cx="-12" cy="-20" r="12" fill="#3aaa4a"/>
    <circle cx="12" cy="-20" r="12" fill="#3aaa4a"/>
    <circle cx="-12" cy="-22" r="8" fill="white"/>
    <circle cx="12" cy="-22" r="8" fill="white"/>
    <circle cx="-10" cy="-22" r="4" fill="#1a3a1a"/>
    <circle cx="14" cy="-22" r="4" fill="#1a3a1a"/>
    <circle cx="-9" cy="-23" r="1.5" fill="white"/>
    <circle cx="15" cy="-23" r="1.5" fill="white"/>
    <!-- Großes Lächeln -->
    <path d="M-12,2 Q0,14 12,2" stroke="#1a5a2a" stroke-width="2" fill="none"/>
    <!-- Blaue Mütze -->
    <path d="M-18,-30 Q0,-48 18,-30" fill="#4a7af5"/>
    <!-- Beine -->
    <path d="M-28,12 Q-40,28 -35,32" stroke="#3aaa4a" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M28,12 Q40,28 35,32" stroke="#3aaa4a" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Hände -->
    <ellipse cx="-35" cy="33" rx="6" ry="4" fill="#2a8a3a"/>
    <ellipse cx="35" cy="33" rx="6" ry="4" fill="#2a8a3a"/>
  </g></g>
  <!-- Sprechblase -->
  <g transform="translate(290, 110)">
    <ellipse cx="0" cy="0" rx="55" ry="30" fill="white" opacity="0.9"/>
    <polygon points="-15,25 -25,45 0,28" fill="white" opacity="0.9"/>
    <text x="0" y="5" text-anchor="middle" fill="#1a3a1a" font-size="12" font-family="Georgia,serif">Hallo! Ich bin</text>
    <text x="0" y="20" text-anchor="middle" fill="#3aaa4a" font-size="14" font-weight="bold" font-family="Georgia,serif">Fridolin!</text>
  </g>
  <!-- Sparkles -->
  <circle cx="100" cy="100" r="3" fill="#ffd700" class="sp"/>
  <circle cx="320" cy="80" r="2.5" fill="#ffd700" class="sp" style="animation-delay:.5s"/>
  <circle cx="80" cy="200" r="2" fill="#4ade80" class="sp" style="animation-delay:1s"/>
</svg>
