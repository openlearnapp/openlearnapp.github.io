version: 1
number: 4
title: "غذا و خرید"
description: "واژگان و عبارات مربوط به غذا، رستوران و خرید به آلمانی"
sections:
  - title: "غذاها و نوشیدنی‌ها"
    explanation: |
      **آشنایی با نام غذاها و نوشیدنی‌ها** برای زندگی روزمره در آلمان ضروری است.
      آلمان به نان، سوسیس و آبجو معروف است اما غذاهای متنوع دیگری هم دارد.
    examples:
      - q: "das Brot"
        a: "نان"
        rel:
          - ["das Brot", "نان", "اسم خنثی - نان آلمانی بسیار متنوع است"]
      - q: "das Wasser"
        a: "آب"
        rel:
          - ["das Wasser", "آب", "اسم خنثی"]
          - ["Mineralwasser", "آب معدنی", "در رستوران‌ها معمولاً آب معدنی سرو می‌شود"]
      - q: "der Kaffee"
        a: "قهوه"
        rel:
          - ["der Kaffee", "قهوه", "اسم مذکر - آلمانی‌ها عاشق قهوه هستند"]
      - q: "der Tee"
        a: "چای"
        rel:
          - ["der Tee", "چای", "اسم مذکر"]
      - q: "das Obst und das Gemüse"
        a: "میوه و سبزیجات"
        rel:
          - ["das Obst", "میوه", "اسم خنثی و جمع نمی‌بندد"]
          - ["das Gemüse", "سبزیجات", "اسم خنثی"]
  - title: "در رستوران"
    explanation: |
      **سفارش دادن در رستوران** یکی از موقعیت‌های مهم مکالمه است.
      با یادگیری چند عبارت کلیدی می‌توانید به راحتی غذا سفارش دهید.
    examples:
      - q: "Die Speisekarte, bitte."
        a: "منوی غذا، لطفاً."
        rel:
          - ["die Speisekarte", "منوی غذا", "اسم مؤنث"]
          - ["bitte", "لطفاً", "کلمه مؤدبانه"]
      - q: "Ich möchte bestellen."
        a: "می‌خواهم سفارش بدهم."
        rel:
          - ["möchten", "خواستن / میل داشتن", "فعل مؤدبانه برای درخواست"]
          - ["bestellen", "سفارش دادن", "فعل مهم در رستوران"]
      - q: "Ich hätte gern einen Kaffee."
        a: "لطفاً یک قهوه می‌خواهم."
        rel:
          - ["Ich hätte gern", "لطفاً می‌خواهم", "شکل بسیار مؤدبانه سفارش"]
      - q: "Die Rechnung, bitte."
        a: "صورتحساب، لطفاً."
        rel:
          - ["die Rechnung", "صورتحساب", "اسم مؤنث"]
      - q: "Das schmeckt sehr gut!"
        a: "خیلی خوشمزه است!"
        rel:
          - ["schmecken", "مزه دادن", "فعل مربوط به طعم غذا"]
          - ["sehr gut", "خیلی خوب", "عبارت تأکیدی"]
  - title: "خرید کردن"
    explanation: |
      **خرید کردن** بخشی از زندگی روزانه است.
      در آلمان سوپرمارکت‌ها و بازارهای هفتگی محبوب هستند.
    examples:
      - q: "Ich suche..."
        a: "دنبال ... می‌گردم."
        rel:
          - ["suchen", "جستجو کردن / دنبال چیزی گشتن", "فعل پرکاربرد در خرید"]
      - q: "Was kostet das?"
        a: "این چقدر است؟"
        rel:
          - ["kosten", "قیمت داشتن", "فعل مهم برای خرید"]
      - q: "Das ist zu teuer."
        a: "این خیلی گران است."
        rel:
          - ["teuer", "گران", "صفت مربوط به قیمت"]
          - ["billig", "ارزان", "متضاد teuer"]
      - q: "Kann ich mit Karte zahlen?"
        a: "می‌توانم با کارت پرداخت کنم؟"
        rel:
          - ["zahlen", "پرداخت کردن", "فعل مهم"]
          - ["die Karte", "کارت", "کارت بانکی"]
