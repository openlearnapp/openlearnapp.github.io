version: 1
number: 4
title: "غذا و خرید"
description: "واژگان و عبارات مربوط به غذا، رستوران و خرید به انگلیسی"
sections:
  - title: "غذاها و نوشیدنی‌ها"
    explanation: |
      **نام غذاها و نوشیدنی‌ها** از واژگان ضروری روزمره هستند.
      با یادگیری این کلمات می‌توانید در رستوران و فروشگاه راحت‌تر ارتباط برقرار کنید.
    examples:
      - q: "bread"
        a: "نان"
        rel:
          - ["bread", "نان", "اسم غیرقابل شمارش - بدون a/an"]
      - q: "water"
        a: "آب"
        rel:
          - ["water", "آب", "اسم غیرقابل شمارش"]
          - ["a glass of water", "یک لیوان آب", "طرز سفارش آب"]
      - q: "coffee"
        a: "قهوه"
        rel:
          - ["coffee", "قهوه", "نوشیدنی محبوب"]
          - ["a cup of coffee", "یک فنجان قهوه", "طرز سفارش قهوه"]
      - q: "tea"
        a: "چای"
        rel:
          - ["tea", "چای", "نوشیدنی محبوب ایرانیان"]
      - q: "fruits and vegetables"
        a: "میوه‌ها و سبزیجات"
        rel:
          - ["fruit", "میوه", "اسم قابل شمارش و غیرقابل شمارش"]
          - ["vegetables", "سبزیجات", "معمولاً به شکل جمع استفاده می‌شود"]
  - title: "در رستوران"
    explanation: |
      **سفارش دادن در رستوران** مهارتی کاربردی است.
      با چند عبارت ساده می‌توانید غذای مورد علاقه خود را سفارش دهید.
    examples:
      - q: "Can I see the menu, please?"
        a: "می‌توانم منو را ببینم، لطفاً؟"
        rel:
          - ["menu", "منو / فهرست غذا", "لیست غذاها و نوشیدنی‌ها"]
      - q: "I would like to order."
        a: "می‌خواهم سفارش بدهم."
        rel:
          - ["would like", "مایل بودن / خواستن", "شکل مؤدبانه want"]
          - ["order", "سفارش دادن", "فعل مهم در رستوران"]
      - q: "I'll have the chicken, please."
        a: "لطفاً مرغ می‌خواهم."
        rel:
          - ["I'll have", "من ... می‌خواهم", "روش رایج سفارش غذا"]
          - ["chicken", "مرغ", "یکی از رایج‌ترین غذاها"]
      - q: "Can I have the bill, please?"
        a: "می‌توانم صورتحساب را بگیرم، لطفاً؟"
        rel:
          - ["bill", "صورتحساب", "در انگلیسی بریتانیایی"]
          - ["check", "صورتحساب", "در انگلیسی آمریکایی"]
      - q: "It's delicious!"
        a: "خوشمزه است!"
        rel:
          - ["delicious", "خوشمزه", "صفت برای غذای بسیار خوب"]
  - title: "خرید کردن"
    explanation: |
      **خرید کردن** فعالیتی روزانه است.
      این عبارات در فروشگاه‌ها، مراکز خرید و بازارها کاربرد دارند.
    examples:
      - q: "I'm looking for..."
        a: "دنبال ... می‌گردم."
        rel:
          - ["looking for", "دنبال چیزی گشتن", "عبارت فعلی پرکاربرد"]
      - q: "How much is this?"
        a: "این چقدر است؟"
        rel:
          - ["How much", "چقدر", "برای پرسیدن قیمت"]
      - q: "It's too expensive."
        a: "خیلی گران است."
        rel:
          - ["expensive", "گران", "صفت قیمت"]
          - ["cheap", "ارزان", "متضاد expensive"]
      - q: "Can I pay by card?"
        a: "می‌توانم با کارت پرداخت کنم؟"
        rel:
          - ["pay", "پرداخت کردن", "فعل مهم"]
          - ["card", "کارت", "کارت بانکی"]
          - ["cash", "نقد", "پول نقد"]
