version: 1
number: 5
title: "Travel and Directions"
description: "Arabic phrases for traveling, asking for directions, and getting around"
sections:
  - title: "Travel Essentials"
    explanation: |
      **Traveling in the Arab world** is an incredible experience. Whether you are visiting historic cities, deserts, or coastal towns, these essential travel phrases will help you navigate airports, hotels, and transportation.
    examples:
      - q: "جواز السفر"
        a: "Passport"
        rel:
          - ["جواز السفر", "Passport", "literally travel permit"]
          - ["سفر", "Travel", "the root word for travel"]
      - q: "مطار / فندق"
        a: "Airport / Hotel"
        rel:
          - ["مطار", "Airport", "where planes depart and arrive"]
          - ["فندق", "Hotel", "a place to stay"]
      - q: "تذكرة"
        a: "Ticket"
        rel:
          - ["تذكرة", "Ticket", "for planes, buses, or trains"]
          - ["تذكرة ذهاب فقط", "One-way ticket", "for travel in one direction"]
          - ["تذكرة ذهاب وعودة", "Round-trip ticket", "for travel both ways"]
      - q: "أين الحمام؟"
        a: "Where is the bathroom?"
        rel:
          - ["أين الحمام؟", "Where is the bathroom?", "one of the most useful travel phrases"]
          - ["أين", "Where", "a key question word"]
      - q: "أحتاج مساعدة"
        a: "I need help"
        rel:
          - ["أحتاج مساعدة", "I need help", "useful in emergencies"]
          - ["أحتاج", "I need", "expressing a need"]

  - title: "Directions"
    explanation: |
      **Asking for and understanding directions** is crucial when exploring new places. Arabic directions are straightforward once you learn the key vocabulary. Landmarks are often used as reference points.
    examples:
      - q: "يمين / يسار"
        a: "Right / Left"
        rel:
          - ["يمين", "Right", "the right direction"]
          - ["يسار", "Left", "the left direction"]
      - q: "مباشرة / إلى الأمام"
        a: "Straight / Forward"
        rel:
          - ["مباشرة", "Straight / Directly", "go straight ahead"]
          - ["إلى الأمام", "Forward", "in the forward direction"]
          - ["إلى الخلف", "Backward", "in the backward direction"]
      - q: "قريب / بعيد"
        a: "Near / Far"
        rel:
          - ["قريب", "Near / Close", "a short distance away"]
          - ["بعيد", "Far", "a long distance away"]
      - q: "أين ...؟"
        a: "Where is ...?"
        rel:
          - ["أين المحطة؟", "Where is the station?", "asking for the station location"]
          - ["أين المستشفى؟", "Where is the hospital?", "asking for the hospital location"]
          - ["أين الفندق؟", "Where is the hotel?", "asking for the hotel location"]
      - q: "شارع / ميدان"
        a: "Street / Square"
        rel:
          - ["شارع", "Street", "a road in a city"]
          - ["ميدان", "Square / Plaza", "an open public area"]
          - ["جسر", "Bridge", "a structure crossing water or a road"]

  - title: "Transportation"
    explanation: |
      **Getting around** in Arab cities involves various modes of transportation. Taxis are widely available, and many cities have modern metro systems. Knowing these words will help you travel efficiently.
    examples:
      - q: "سيارة أجرة"
        a: "Taxi"
        rel:
          - ["سيارة أجرة", "Taxi", "a car for hire"]
          - ["سيارة", "Car", "a general automobile"]
      - q: "حافلة / قطار"
        a: "Bus / Train"
        rel:
          - ["حافلة", "Bus", "public transportation"]
          - ["قطار", "Train", "rail transportation"]
          - ["مترو", "Metro / Subway", "underground train system"]
      - q: "محطة"
        a: "Station / Stop"
        rel:
          - ["محطة", "Station", "a bus or train stop"]
          - ["محطة الحافلات", "Bus station", "where buses depart"]
          - ["محطة القطار", "Train station", "where trains depart"]
      - q: "خذني إلى ... من فضلك"
        a: "Take me to ... please"
        rel:
          - ["خذني إلى", "Take me to", "used when giving a taxi driver a destination"]
          - ["من فضلك", "Please", "always polite to include"]
      - q: "كم المسافة؟"
        a: "How far is it?"
        rel:
          - ["كم المسافة؟", "How far is it?", "asking about distance"]
          - ["كم الوقت؟", "How long does it take?", "asking about travel time"]
