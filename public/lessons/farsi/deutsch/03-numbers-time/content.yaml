version: 1
number: 3
title: "اعداد و زمان"
description: "یادگیری اعداد، ساعت و روزهای هفته به آلمانی"
sections:
  - title: "اعداد ۱ تا ۱۲"
    explanation: |
      **اعداد آلمانی** پایه و اساس بسیاری از مکالمات هستند.
      برای خرید، گفتن ساعت و شماره تلفن به اعداد نیاز دارید.
    examples:
      - q: "eins, zwei, drei"
        a: "یک، دو، سه"
        rel:
          - ["eins", "یک", "عدد ۱"]
          - ["zwei", "دو", "عدد ۲"]
          - ["drei", "سه", "عدد ۳"]
      - q: "vier, fünf, sechs"
        a: "چهار، پنج، شش"
        rel:
          - ["vier", "چهار", "عدد ۴"]
          - ["fünf", "پنج", "عدد ۵"]
          - ["sechs", "شش", "عدد ۶"]
      - q: "sieben, acht, neun"
        a: "هفت، هشت، نه"
        rel:
          - ["sieben", "هفت", "عدد ۷"]
          - ["acht", "هشت", "عدد ۸"]
          - ["neun", "نه", "عدد ۹"]
      - q: "zehn, elf, zwölf"
        a: "ده، یازده، دوازده"
        rel:
          - ["zehn", "ده", "عدد ۱۰"]
          - ["elf", "یازده", "عدد ۱۱"]
          - ["zwölf", "دوازده", "عدد ۱۲"]
  - title: "ساعت و زمان"
    explanation: |
      **گفتن ساعت** در آلمانی کمی با فارسی متفاوت است.
      آلمانی‌ها هم از سیستم ۱۲ ساعته و هم ۲۴ ساعته استفاده می‌کنند.
    examples:
      - q: "Wie spät ist es?"
        a: "ساعت چند است؟"
        rel:
          - ["Wie spät", "چقدر دیر", "عبارت پرسشی برای ساعت"]
      - q: "Es ist drei Uhr."
        a: "ساعت سه است."
        rel:
          - ["Uhr", "ساعت", "واحد زمان"]
      - q: "Es ist halb vier."
        a: "ساعت سه و نیم است."
        rel:
          - ["halb", "نصف / نیم", "در آلمانی نیم ساعت قبل از ساعت بعدی گفته می‌شود"]
      - q: "Viertel vor fünf"
        a: "یک ربع به پنج"
        rel:
          - ["Viertel", "ربع / یک‌چهارم", "برای ۱۵ دقیقه"]
          - ["vor", "قبل از / به", "حرف اضافه زمانی"]
      - q: "Viertel nach zwei"
        a: "دو و ربع"
        rel:
          - ["nach", "بعد از", "حرف اضافه زمانی"]
  - title: "روزهای هفته و ماه‌ها"
    explanation: |
      **روزهای هفته** در آلمانی همیشه با حرف بزرگ نوشته می‌شوند.
      دانستن روزها و ماه‌ها برای قرار ملاقات و برنامه‌ریزی ضروری است.
    examples:
      - q: "Montag, Dienstag, Mittwoch"
        a: "دوشنبه، سه‌شنبه، چهارشنبه"
        rel:
          - ["Montag", "دوشنبه", "اولین روز هفته در آلمان"]
          - ["Dienstag", "سه‌شنبه", "دومین روز هفته"]
          - ["Mittwoch", "چهارشنبه", "وسط هفته"]
      - q: "Donnerstag, Freitag"
        a: "پنجشنبه، جمعه"
        rel:
          - ["Donnerstag", "پنجشنبه", "روز چهارم هفته"]
          - ["Freitag", "جمعه", "روز پنجم هفته"]
      - q: "Samstag, Sonntag"
        a: "شنبه، یکشنبه"
        rel:
          - ["Samstag", "شنبه", "روز ششم هفته"]
          - ["Sonntag", "یکشنبه", "روز تعطیل در آلمان"]
      - q: "Heute ist Montag."
        a: "امروز دوشنبه است."
        rel:
          - ["heute", "امروز", "قید زمان"]
          - ["gestern", "دیروز", "قید زمان مرتبط"]
          - ["morgen", "فردا", "قید زمان مرتبط"]
