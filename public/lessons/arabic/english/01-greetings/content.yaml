version: 1
number: 1
title: "التحيات والمجاملات"
description: "أهم عبارات التحية والمجاملة بالإنجليزية"
sections:
  - title: "التحيات الأساسية"
    explanation: |
      **التحيات الإنجليزية** متنوعة وتختلف حسب درجة الرسمية.
      بعضها رسمي يُستخدم في العمل، وبعضها غير رسمي يُستخدم مع الأصدقاء.
    examples:
      - q: "Hello"
        a: "مرحباً"
        rel:
          - ["Hello", "مرحباً", "تحية عامة"]
      - q: "Good morning"
        a: "صباح الخير"
        rel:
          - ["Good", "جيد / طيب", "صفة"]
          - ["morning", "الصباح", "اسم"]
      - q: "Good afternoon"
        a: "مساء الخير (بعد الظهر)"
        rel:
          - ["Good", "جيد / طيب", "صفة"]
          - ["afternoon", "بعد الظهر", "اسم"]
      - q: "Good evening"
        a: "مساء الخير"
        rel:
          - ["Good", "جيد / طيب", "صفة"]
          - ["evening", "المساء", "اسم"]
      - q: "Good night"
        a: "تصبح على خير"
        rel:
          - ["Good", "جيد / طيب", "صفة"]
          - ["night", "الليل", "اسم"]
  - title: "المجاملات والتعارف"
    explanation: |
      **عند التعارف** بالإنجليزية، من المهم معرفة كيفية تقديم نفسك
      والسؤال عن حال الآخرين. هذه العبارات تُستخدم يومياً.
    examples:
      - q: "How are you?"
        a: "كيف حالك؟"
        rel:
          - ["How", "كيف", "أداة استفهام"]
          - ["are", "تكون", "فعل"]
          - ["you", "أنت", "ضمير"]
      - q: "I'm fine, thank you"
        a: "أنا بخير، شكراً"
        rel:
          - ["I'm", "أنا", "ضمير مختصر"]
          - ["fine", "بخير", "صفة"]
          - ["thank you", "شكراً لك", "تعبير"]
      - q: "Nice to meet you"
        a: "تشرفت بمعرفتك"
        rel:
          - ["Nice", "سعيد / لطيف", "صفة"]
          - ["meet", "يقابل / يلتقي", "فعل"]
      - q: "My name is Ahmad"
        a: "اسمي أحمد"
        rel:
          - ["My", "ملكي", "ضمير ملكية"]
          - ["name", "اسم", "اسم"]
      - q: "Goodbye"
        a: "مع السلامة"
        rel:
          - ["Goodbye", "مع السلامة", "تحية وداع"]
  - title: "عبارات مهذبة"
    explanation: |
      **الأدب** جزء أساسي من التواصل بالإنجليزية.
      هذه الكلمات والعبارات تُستخدم بكثرة في الحياة اليومية.
    examples:
      - q: "Please"
        a: "من فضلك"
        rel:
          - ["Please", "من فضلك", "تعبير مهذب"]
      - q: "Thank you very much"
        a: "شكراً جزيلاً"
        rel:
          - ["Thank you", "شكراً لك", "تعبير"]
          - ["very much", "جداً / كثيراً", "ظرف"]
      - q: "Excuse me"
        a: "عذراً / المعذرة"
        rel:
          - ["Excuse", "يعذر", "فعل"]
          - ["me", "ني / أنا", "ضمير"]
      - q: "I'm sorry"
        a: "أنا آسف"
        rel:
          - ["I'm", "أنا", "ضمير مختصر"]
          - ["sorry", "آسف", "صفة"]
