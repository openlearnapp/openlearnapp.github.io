version: 1
number: 2
title: "الكلمات اليومية"
description: "كلمات وعبارات إنجليزية تُستخدم في الحياة اليومية"
sections:
  - title: "الأشخاص والعائلة"
    explanation: |
      **كلمات العائلة والأشخاص** من أكثر الكلمات استخداماً في اللغة الإنجليزية.
      في الإنجليزية، لا يوجد جنس نحوي للأسماء كما في العربية.
    examples:
      - q: "man"
        a: "رجل"
        rel:
          - ["man", "رجل", "اسم، جمعه men"]
      - q: "woman"
        a: "امرأة"
        rel:
          - ["woman", "امرأة", "اسم، جمعه women"]
      - q: "child"
        a: "طفل"
        rel:
          - ["child", "طفل", "اسم، جمعه children"]
      - q: "family"
        a: "عائلة"
        rel:
          - ["family", "عائلة", "اسم، جمعه families"]
      - q: "friend"
        a: "صديق"
        rel:
          - ["friend", "صديق", "اسم"]
  - title: "الأشياء اليومية"
    explanation: |
      **الأشياء التي نستخدمها يومياً** مهمة لبناء مفرداتك الإنجليزية.
      في الإنجليزية، نستخدم أدوات التعريف (the) والتنكير (a/an) قبل الأسماء.
    examples:
      - q: "house"
        a: "بيت / منزل"
        rel:
          - ["house", "بيت / منزل", "اسم"]
      - q: "water"
        a: "ماء"
        rel:
          - ["water", "ماء", "اسم غير معدود"]
      - q: "book"
        a: "كتاب"
        rel:
          - ["book", "كتاب", "اسم"]
      - q: "table"
        a: "طاولة"
        rel:
          - ["table", "طاولة", "اسم"]
      - q: "door"
        a: "باب"
        rel:
          - ["door", "باب", "اسم"]
  - title: "الأفعال الأساسية"
    explanation: |
      **الأفعال الأساسية** هي أساس بناء الجمل في الإنجليزية.
      في الإنجليزية، تتغير بعض الأفعال بشكل غير منتظم في الماضي.
    examples:
      - q: "to be"
        a: "يكون"
        rel:
          - ["to be", "يكون", "فعل أساسي غير منتظم"]
      - q: "to have"
        a: "يملك"
        rel:
          - ["to have", "يملك", "فعل أساسي غير منتظم"]
      - q: "to do"
        a: "يفعل"
        rel:
          - ["to do", "يفعل", "فعل أساسي غير منتظم"]
      - q: "to go"
        a: "يذهب"
        rel:
          - ["to go", "يذهب", "فعل غير منتظم"]
