version: 1
number: 1
title: "سلام و احوالپرسی"
description: "مهم‌ترین عبارات سلام و احوالپرسی به انگلیسی"
sections:
  - title: "سلام‌های رسمی و غیررسمی"
    explanation: |
      **سلام‌های انگلیسی** بسته به موقعیت رسمی یا غیررسمی متفاوت هستند.
      در محیط کار از سلام‌های رسمی و با دوستان از سلام‌های غیررسمی استفاده کنید.
    examples:
      - q: "Hello"
        a: "سلام"
        rel:
          - ["Hello", "سلام", "سلام عمومی مناسب برای همه موقعیت‌ها"]
      - q: "Good morning"
        a: "صبح بخیر"
        rel:
          - ["Good morning", "صبح بخیر", "از صبح تا حدود ظهر استفاده می‌شود"]
      - q: "Good afternoon"
        a: "بعدازظهر بخیر"
        rel:
          - ["Good afternoon", "بعدازظهر بخیر", "از ظهر تا عصر استفاده می‌شود"]
      - q: "Good evening"
        a: "عصر بخیر"
        rel:
          - ["Good evening", "عصر بخیر", "از عصر به بعد استفاده می‌شود"]
      - q: "Hi! / Hey!"
        a: "سلام!"
        rel:
          - ["Hi", "سلام", "سلام غیررسمی و دوستانه"]
          - ["Hey", "سلام / هی", "سلام بسیار غیررسمی"]
  - title: "احوالپرسی"
    explanation: |
      بعد از سلام معمولاً **احوالپرسی** می‌کنیم.
      در انگلیسی چند روش معمول برای پرسیدن حال افراد وجود دارد.
    examples:
      - q: "How are you?"
        a: "حالت چطوره؟"
        rel:
          - ["How are you?", "حالت چطوره؟", "رایج‌ترین شکل احوالپرسی"]
      - q: "I'm fine, thank you."
        a: "خوبم، ممنون."
        rel:
          - ["fine", "خوب", "صفت رایج برای بیان حال"]
          - ["thank you", "ممنون", "تشکر مؤدبانه"]
      - q: "How's it going?"
        a: "اوضاع چطوره؟"
        rel:
          - ["How's it going?", "اوضاع چطوره؟", "احوالپرسی غیررسمی"]
      - q: "Not bad."
        a: "بد نیست."
        rel:
          - ["Not bad", "بد نیست", "پاسخی معمول و خنثی"]
      - q: "What's up?"
        a: "چه خبر؟"
        rel:
          - ["What's up?", "چه خبر؟", "سلام و احوالپرسی بسیار غیررسمی"]
  - title: "خداحافظی"
    explanation: |
      **عبارات خداحافظی** در انگلیسی متنوع هستند.
      انتخاب عبارت مناسب به میزان صمیمیت و موقعیت بستگی دارد.
    examples:
      - q: "Goodbye"
        a: "خداحافظ"
        rel:
          - ["Goodbye", "خداحافظ", "خداحافظی رسمی و عمومی"]
      - q: "Bye! / Bye-bye!"
        a: "خداحافظ!"
        rel:
          - ["Bye", "خداحافظ", "شکل کوتاه و غیررسمی"]
      - q: "See you later"
        a: "بعداً می‌بینمت"
        rel:
          - ["See you later", "بعداً می‌بینمت", "خداحافظی دوستانه"]
      - q: "Take care"
        a: "مواظب خودت باش"
        rel:
          - ["Take care", "مواظب خودت باش", "خداحافظی صمیمانه و مهربانانه"]
