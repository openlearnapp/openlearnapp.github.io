version: 1
number: 4
title: "الطعام والتسوق"
description: "كلمات وعبارات ألمانية للطعام والتسوق"
sections:
  - title: "أنواع الطعام"
    explanation: |
      **كلمات الطعام** ضرورية عند زيارة المطاعم أو التسوق في ألمانيا.
      كل اسم طعام في الألمانية له جنس نحوي (مذكر، مؤنث، أو محايد).
    examples:
      - q: "das Brot"
        a: "الخبز"
        rel:
          - ["das", "ال (أداة تعريف محايد)", "أداة"]
          - ["Brot", "خبز", "اسم محايد"]
      - q: "die Milch"
        a: "الحليب"
        rel:
          - ["die", "ال (أداة تعريف مؤنث)", "أداة"]
          - ["Milch", "حليب", "اسم مؤنث"]
      - q: "das Fleisch"
        a: "اللحم"
        rel:
          - ["das", "ال (أداة تعريف محايد)", "أداة"]
          - ["Fleisch", "لحم", "اسم محايد"]
      - q: "der Reis"
        a: "الأرز"
        rel:
          - ["der", "ال (أداة تعريف مذكر)", "أداة"]
          - ["Reis", "أرز", "اسم مذكر"]
      - q: "das Obst und das Gemüse"
        a: "الفواكه والخضروات"
        rel:
          - ["Obst", "فواكه", "اسم محايد جمعي"]
          - ["und", "و", "حرف عطف"]
          - ["Gemüse", "خضروات", "اسم محايد جمعي"]
  - title: "في المطعم"
    explanation: |
      **في المطعم الألماني** ستحتاج هذه العبارات لطلب الطعام والشراب.
      من المعتاد في ألمانيا أن تقول ما تريد بشكل مباشر ومهذب.
    examples:
      - q: "Die Speisekarte, bitte"
        a: "قائمة الطعام، من فضلك"
        rel:
          - ["Speisekarte", "قائمة الطعام", "اسم مؤنث مركب"]
          - ["bitte", "من فضلك", "تعبير مهذب"]
      - q: "Ich möchte bestellen"
        a: "أريد أن أطلب"
        rel:
          - ["Ich", "أنا", "ضمير"]
          - ["möchte", "أريد / أود", "فعل مساعد"]
          - ["bestellen", "يطلب", "فعل"]
      - q: "Die Rechnung, bitte"
        a: "الحساب، من فضلك"
        rel:
          - ["Rechnung", "حساب / فاتورة", "اسم مؤنث"]
          - ["bitte", "من فضلك", "تعبير مهذب"]
      - q: "Das schmeckt sehr gut"
        a: "هذا طعمه لذيذ جداً"
        rel:
          - ["Das", "هذا", "ضمير إشارة"]
          - ["schmeckt", "طعمه / مذاقه", "فعل"]
          - ["sehr gut", "جيد جداً / لذيذ جداً", "ظرف + صفة"]
  - title: "التسوق"
    explanation: |
      **عند التسوق** في ألمانيا، ستحتاج إلى معرفة كيفية السؤال عن الأسعار
      والكميات. معظم المتاجر في ألمانيا تقبل الدفع النقدي وبالبطاقة.
    examples:
      - q: "Was kostet das?"
        a: "كم يكلف هذا؟"
        rel:
          - ["Was", "ماذا / كم", "أداة استفهام"]
          - ["kostet", "يكلف", "فعل"]
          - ["das", "هذا", "ضمير إشارة"]
      - q: "Das ist zu teuer"
        a: "هذا غالٍ جداً"
        rel:
          - ["Das", "هذا", "ضمير إشارة"]
          - ["ist", "يكون", "فعل"]
          - ["zu teuer", "غالٍ جداً", "ظرف + صفة"]
      - q: "Ich nehme das"
        a: "سآخذ هذا"
        rel:
          - ["Ich", "أنا", "ضمير"]
          - ["nehme", "آخذ", "فعل"]
          - ["das", "هذا", "ضمير إشارة"]
      - q: "Wo ist der Supermarkt?"
        a: "أين السوبرماركت؟"
        rel:
          - ["Wo", "أين", "أداة استفهام"]
          - ["ist", "يكون", "فعل"]
          - ["Supermarkt", "سوبرماركت", "اسم مذكر"]
