version: 1
number: 2
title: "کلمات روزمره"
description: "کلمات و عبارات پرکاربرد آلمانی برای زندگی روزمره"
sections:
  - title: "ضمایر و معرفی خود"
    explanation: |
      **معرفی کردن خود** یکی از اولین مهارت‌هایی است که به آن نیاز دارید.
      در آلمانی ضمایر شخصی نقش مهمی در جمله‌سازی دارند.
    examples:
      - q: "Ich bin..."
        a: "من هستم..."
        rel:
          - ["ich", "من", "ضمیر اول شخص مفرد"]
          - ["bin", "هستم", "فعل بودن برای اول شخص"]
      - q: "Ich heiße..."
        a: "اسم من ... است."
        rel:
          - ["heißen", "نامیدن / نام داشتن", "فعل پرکاربرد برای معرفی"]
      - q: "Ich komme aus dem Iran."
        a: "من اهل ایران هستم."
        rel:
          - ["kommen aus", "اهل بودن از", "عبارت فعلی برای بیان ملیت"]
          - ["dem Iran", "ایران", "ایران در آلمانی با حرف تعریف می‌آید"]
      - q: "Ich spreche Persisch."
        a: "من فارسی صحبت می‌کنم."
        rel:
          - ["sprechen", "صحبت کردن", "فعل مهم برای زبان‌ها"]
          - ["Persisch", "فارسی", "زبان فارسی به آلمانی"]
      - q: "Freut mich!"
        a: "از آشنایی‌تان خوشبختم!"
        rel:
          - ["Freut mich!", "از آشنایی‌تان خوشبختم!", "عبارت رایج هنگام معرفی"]
  - title: "کلمات مؤدبانه"
    explanation: |
      **ادب و احترام** در فرهنگ آلمان بسیار مهم است.
      استفاده از کلمات مؤدبانه در مکالمات روزمره ضروری است.
    examples:
      - q: "Bitte"
        a: "لطفاً"
        rel:
          - ["Bitte", "لطفاً", "هم به معنای لطفاً و هم خواهش می‌کنم"]
      - q: "Danke schön"
        a: "خیلی ممنون"
        rel:
          - ["Danke schön", "خیلی ممنون", "تشکر مؤدبانه"]
          - ["schön", "زیبا / خیلی", "صفت پرکاربرد"]
      - q: "Entschuldigung"
        a: "ببخشید"
        rel:
          - ["Entschuldigung", "ببخشید", "برای عذرخواهی یا جلب توجه"]
      - q: "Es tut mir leid."
        a: "متأسفم."
        rel:
          - ["Es tut mir leid.", "متأسفم.", "برای ابراز تأسف عمیق‌تر"]
      - q: "Kein Problem"
        a: "مشکلی نیست"
        rel:
          - ["Kein Problem", "مشکلی نیست", "پاسخ غیررسمی به عذرخواهی"]
  - title: "سؤالات پایه"
    explanation: |
      **پرسیدن سؤال** مهارتی کلیدی برای ارتباط است.
      کلمات پرسشی آلمانی معمولاً با «W» شروع می‌شوند.
    examples:
      - q: "Was ist das?"
        a: "این چیست؟"
        rel:
          - ["was", "چه / چی", "کلمه پرسشی برای چیزها"]
      - q: "Wo ist die Toilette?"
        a: "دستشویی کجاست؟"
        rel:
          - ["wo", "کجا", "کلمه پرسشی برای مکان"]
          - ["die Toilette", "دستشویی", "اسم مؤنث"]
      - q: "Wie viel kostet das?"
        a: "این چقدر است؟"
        rel:
          - ["wie viel", "چقدر", "برای پرسیدن مقدار یا قیمت"]
          - ["kosten", "قیمت داشتن", "فعل مربوط به قیمت"]
      - q: "Können Sie mir helfen?"
        a: "می‌توانید به من کمک کنید؟"
        rel:
          - ["können", "توانستن", "فعل کمکی"]
          - ["helfen", "کمک کردن", "فعل مهم در موقعیت‌های مختلف"]
