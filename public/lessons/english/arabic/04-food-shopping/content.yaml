version: 1
number: 4
title: "Food and Shopping"
description: "Arabic vocabulary for food, drinks, dining out, and shopping"
sections:
  - title: "Food and Drinks"
    explanation: |
      **Arabic cuisine** is rich and varied across the Arab world. Knowing food vocabulary will help you navigate menus, markets, and conversations about meals. Many Arabic food words have entered English, such as "hummus" and "falafel."
    examples:
      - q: "خبز"
        a: "Bread"
        rel:
          - ["خبز", "Bread", "a staple food across the Arab world"]
          - ["أرز", "Rice", "another staple grain"]
      - q: "ماء / حليب"
        a: "Water / Milk"
        rel:
          - ["ماء", "Water", "the most essential drink"]
          - ["حليب", "Milk", "a common dairy drink"]
          - ["شاي", "Tea", "a very popular drink in the Arab world"]
          - ["قهوة", "Coffee", "Arabic coffee is a cultural tradition"]
      - q: "لحم / دجاج / سمك"
        a: "Meat / Chicken / Fish"
        rel:
          - ["لحم", "Meat", "usually refers to red meat"]
          - ["دجاج", "Chicken", "a common protein"]
          - ["سمك", "Fish", "popular in coastal areas"]
      - q: "فاكهة / خضروات"
        a: "Fruit / Vegetables"
        rel:
          - ["فاكهة", "Fruit", "the general word for fruit"]
          - ["خضروات", "Vegetables", "the general word for vegetables"]
          - ["تفاح", "Apple", "a common fruit"]
          - ["طماطم", "Tomato", "used in many Arab dishes"]
      - q: "أنا جائع / أنا عطشان"
        a: "I am hungry / I am thirsty"
        rel:
          - ["أنا جائع", "I am hungry", "expressing hunger"]
          - ["أنا عطشان", "I am thirsty", "expressing thirst"]

  - title: "At the Restaurant"
    explanation: |
      **Dining out** in the Arab world is a social experience. These phrases will help you order food, ask about the menu, and interact with restaurant staff politely.
    examples:
      - q: "القائمة، من فضلك"
        a: "The menu, please"
        rel:
          - ["القائمة", "The menu", "the word for a restaurant menu"]
          - ["من فضلك", "Please", "always polite to add"]
      - q: "أريد ..."
        a: "I want ..."
        rel:
          - ["أريد", "I want", "used to order or request something"]
          - ["أريد ماء", "I want water", "an example of ordering"]
      - q: "الحساب، من فضلك"
        a: "The bill, please"
        rel:
          - ["الحساب", "The bill / The check", "asked for at the end of a meal"]
      - q: "لذيذ جداً"
        a: "Very delicious"
        rel:
          - ["لذيذ", "Delicious", "a compliment for good food"]
          - ["جداً", "Very", "an intensifier"]
      - q: "هل عندكم ...؟"
        a: "Do you have ...?"
        rel:
          - ["هل عندكم", "Do you have", "used to ask about availability"]

  - title: "Shopping"
    explanation: |
      **Shopping in Arab markets** (souqs) is an experience in itself. Bargaining is common in traditional markets. These phrases will help you ask about prices, negotiate, and make purchases.
    examples:
      - q: "بكم هذا؟"
        a: "How much is this?"
        rel:
          - ["بكم هذا؟", "How much is this?", "the essential shopping question"]
          - ["بكم", "How much", "asking about the price"]
      - q: "غالي جداً"
        a: "Too expensive"
        rel:
          - ["غالي", "Expensive", "used to describe high prices"]
          - ["رخيص", "Cheap", "the opposite of غالي"]
      - q: "هل يمكن تخفيض السعر؟"
        a: "Can you lower the price?"
        rel:
          - ["هل يمكن تخفيض السعر؟", "Can you lower the price?", "useful for bargaining in souqs"]
          - ["السعر", "The price", "the word for price"]
      - q: "أريد أن أشتري ..."
        a: "I want to buy ..."
        rel:
          - ["أريد أن أشتري", "I want to buy", "expressing intent to purchase"]
          - ["محل", "Shop / Store", "a place to buy things"]
          - ["سوق", "Market", "a traditional Arab market"]
      - q: "نقود / بطاقة"
        a: "Cash / Card"
        rel:
          - ["نقود", "Cash / Money", "physical money"]
          - ["بطاقة", "Card", "credit or debit card"]
