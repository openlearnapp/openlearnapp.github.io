version: 1
number: 2
title: "کلمات روزمره"
description: "کلمات و عبارات پرکاربرد انگلیسی برای زندگی روزمره"
sections:
  - title: "معرفی خود"
    explanation: |
      **معرفی کردن خود** اولین قدم در هر مکالمه‌ای است.
      با این عبارات می‌توانید خودتان را به انگلیسی معرفی کنید.
    examples:
      - q: "My name is..."
        a: "اسم من ... است."
        rel:
          - ["My name is", "اسم من ... است", "رایج‌ترین روش معرفی نام"]
      - q: "I am from Iran."
        a: "من اهل ایران هستم."
        rel:
          - ["I am from", "من اهل ... هستم", "برای بیان ملیت یا شهر"]
      - q: "I speak Persian."
        a: "من فارسی صحبت می‌کنم."
        rel:
          - ["speak", "صحبت کردن", "فعل مربوط به زبان"]
          - ["Persian", "فارسی", "زبان فارسی به انگلیسی"]
      - q: "Nice to meet you."
        a: "از آشنایی‌تان خوشبختم."
        rel:
          - ["Nice to meet you", "از آشنایی‌تان خوشبختم", "عبارت مهم هنگام آشنایی"]
      - q: "I am learning English."
        a: "دارم انگلیسی یاد می‌گیرم."
        rel:
          - ["learning", "یادگیری / در حال یادگرفتن", "شکل استمراری فعل learn"]
  - title: "کلمات مؤدبانه"
    explanation: |
      **ادب و نزاکت** در فرهنگ انگلیسی‌زبانان اهمیت زیادی دارد.
      این کلمات را در هر مکالمه‌ای استفاده خواهید کرد.
    examples:
      - q: "Please"
        a: "لطفاً"
        rel:
          - ["Please", "لطفاً", "برای درخواست مؤدبانه"]
      - q: "Thank you / Thanks"
        a: "ممنون / مرسی"
        rel:
          - ["Thank you", "ممنون", "تشکر مؤدبانه"]
          - ["Thanks", "مرسی", "تشکر غیررسمی"]
      - q: "You're welcome."
        a: "خواهش می‌کنم."
        rel:
          - ["You're welcome", "خواهش می‌کنم", "پاسخ به تشکر"]
      - q: "Excuse me"
        a: "ببخشید"
        rel:
          - ["Excuse me", "ببخشید", "برای جلب توجه یا عبور از کنار کسی"]
      - q: "I'm sorry."
        a: "متأسفم."
        rel:
          - ["sorry", "متأسف", "برای عذرخواهی"]
  - title: "سؤالات پایه"
    explanation: |
      **سؤال پرسیدن** یکی از مهم‌ترین مهارت‌ها در هر زبانی است.
      کلمات پرسشی انگلیسی معمولاً با «Wh» شروع می‌شوند.
    examples:
      - q: "What is this?"
        a: "این چیست؟"
        rel:
          - ["what", "چه / چی", "کلمه پرسشی برای چیزها"]
      - q: "Where is the bathroom?"
        a: "دستشویی کجاست؟"
        rel:
          - ["where", "کجا", "کلمه پرسشی برای مکان"]
      - q: "How much does it cost?"
        a: "قیمتش چقدر است؟"
        rel:
          - ["how much", "چقدر", "برای پرسیدن قیمت یا مقدار"]
          - ["cost", "هزینه داشتن / قیمت داشتن", "فعل مربوط به قیمت"]
      - q: "Can you help me?"
        a: "می‌توانید به من کمک کنید؟"
        rel:
          - ["can", "توانستن", "فعل کمکی"]
          - ["help", "کمک کردن", "فعل پرکاربرد"]
